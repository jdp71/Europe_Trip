name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install qrcode[pil] pillow

      - name: Build trip app
        run: python app/build.py && python app/make_icons.py

      - name: Verify map assets
        run: |
          ls -la app/assets/maps/ || echo "No maps dir"
          python -c "import json; d=json.load(open('app/trip-data.json')); day=next(x for x in d['days'] if x['date']=='2026-07-13'); print('hvar photo_data', bool(day.get('photo_data'))); print('maps with data', sum(1 for x in d['days'] if x.get('map_data')))"

      - name: Add GitHub Pages marker
        run: touch app/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app
