<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Europe Trip">
  <meta name="theme-color" content="#1a365d">
  <title>Europe Trip 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/app.css?v=15">
</head>
<body>
  <div id="app">
    <header class="header">
      <button id="back-btn" class="back-btn hidden" aria-label="Back"><span class="back-icon">←</span><span class="back-label">Back</span></button>
      <div class="header-text">
        <h1 id="header-title">Europe Trip</h1>
        <p id="header-sub" class="header-sub"></p>
      </div>
      <div id="offline-badge" class="offline-badge hidden" title="Offline mode">Offline</div>
    </header>
    <main id="main" class="main"><p class="loading-msg">Loading trip…</p></main>
    <nav id="tab-bar" class="tab-bar">
      <button class="tab" data-view="today">Today</button>
      <button class="tab" data-view="days">Days</button>
      <button class="tab" data-view="all">All</button>
      <button class="tab" data-view="docs">PDFs</button>
    </nav>
  </div>
  <div id="toast" class="toast hidden"></div>
  <script>
    (function () {
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (reg) { reg.unregister(); });
        });
      }
      if ("caches" in window) {
        caches.keys().then(function (keys) {
          keys.forEach(function (key) { caches.delete(key); });
        });
      }
    })();
  </script>
  <script src="js/app.js?v=15"></script>
</body>
</html>
